# V2 continuous integration. Runs on every push + PR.
# Single job: build + test the 3-crate workspace on Linux x86_64.
# Platform matrix lives in release.yml (only fires on tags).

name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: cargo build
        run: cargo build --workspace --locked
      - name: cargo test
        run: cargo test --workspace --locked
      - name: aegis-mcp smoke
        run: |
          # MCP server should answer initialize over stdio JSON-RPC.
          # V2 has no `aegis` CLI binary — `aegis-mcp` is the only
          # application; everything else is library code in aegis-core.
          echo '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{}}' \
            | ./target/debug/aegis-mcp \
            | grep -q '"protocolVersion"'
