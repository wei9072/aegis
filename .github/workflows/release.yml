# V2 cross-platform release artifacts.
#
# Triggers on tag push (v*.*.*). Builds `aegis-mcp` for the 5-platform
# matrix (Linux x86_64/aarch64, macOS x86_64/aarch64, Windows x86_64)
# and uploads to the GitHub Release.
#
# To kick off a release:
#
#   git tag v0.2.0 && git push origin v0.2.0
#
# Artifacts attach to the auto-created GitHub Release for that tag.

name: release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            archive: tar.gz
            cross: true
          - os: macos-latest
            target: x86_64-apple-darwin
            archive: tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            archive: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross (linux-aarch64)
        if: matrix.cross == true
        run: cargo install cross --locked

      - name: Build aegis-mcp
        shell: bash
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }} -p aegis-mcp
          else
            cargo build --release --target ${{ matrix.target }} -p aegis-mcp
          fi

      - name: Package
        shell: bash
        run: |
          set -euo pipefail
          STAGE="aegis-${{ github.ref_name }}-${{ matrix.target }}"
          mkdir -p "$STAGE"
          if [ "${{ runner.os }}" = "Windows" ]; then
            cp "target/${{ matrix.target }}/release/aegis-mcp.exe" "$STAGE/"
            7z a "${STAGE}.zip" "$STAGE/"
            echo "ASSET=${STAGE}.zip" >> "$GITHUB_ENV"
          else
            cp "target/${{ matrix.target }}/release/aegis-mcp" "$STAGE/"
            cp README.md LICENSE "$STAGE/"
            tar -czf "${STAGE}.tar.gz" "$STAGE"
            echo "ASSET=${STAGE}.tar.gz" >> "$GITHUB_ENV"
          fi

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ASSET }}
          generate_release_notes: true
