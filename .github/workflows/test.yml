name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  pytest:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            aegis-core-rs/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('aegis-core-rs/Cargo.lock') }}

      - name: Install Python build + test dependencies
        run: |
          python -m pip install --upgrade pip
          # No pyproject.toml yet — install deps explicitly. Tracks the
          # editable .venv setup developers use locally. When pyproject.toml
          # lands, this collapses to `pip install -e .[dev]`.
          pip install \
            maturin \
            pytest \
            click \
            prompt_toolkit \
            google-genai \
            google-generativeai

      - name: Build aegis-core-rs wheel and install
        # `maturin develop` requires an active virtualenv (it injects the
        # built extension into the venv's site-packages). GitHub Actions'
        # setup-python doesn't create one, so develop fails with
        # "Couldn't find a virtualenv or conda environment". The
        # workaround is the explicit two-step that maturin's own error
        # message suggests: build a wheel, then pip install it.
        run: |
          cd aegis-core-rs
          maturin build --release --out dist/
          pip install dist/*.whl

      - name: Run pytest
        env:
          # Tests must not hit real LLM APIs. Provider tests mock at the
          # urllib boundary. If a test ever needs a real key, that's a
          # design bug — flag in PR review.
          PYTHONPATH: ${{ github.workspace }}
        run: pytest tests/ -v --tb=short
