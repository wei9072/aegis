name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  pytest:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            aegis-core-rs/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('aegis-core-rs/Cargo.lock') }}

      - name: Install Aegis (builds Rust extension via maturin backend)
        # Single-step install per pyproject.toml — maturin mixed-mode
        # builds aegis._core (Rust) AND installs the Python packages
        # AND pulls in deps AND registers the `aegis` / `aegis-mcp` CLIs.
        # The [dev,mcp] extras add pytest and the MCP SDK respectively.
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,mcp]"

      - name: Run pytest
        env:
          # Tests must not hit real LLM APIs. Provider tests mock at the
          # urllib boundary. If a test ever needs a real key, that's a
          # design bug — flag in PR review.
          PYTHONPATH: ${{ github.workspace }}
        run: pytest tests/ -v --tb=short
